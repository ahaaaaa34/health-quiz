<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#2d6a4f"/>
<title>アイオワの玉葱 — 確認テスト</title>
<link rel="manifest" href="manifest.json"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f0f4f0;color:#222;min-height:100vh;display:flex;flex-direction:column}
header{background:linear-gradient(135deg,#1b4332,#2d6a4f);color:#fff;padding:16px 20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.25)}
header h1{font-size:1.1rem;letter-spacing:.05em}
header p{font-size:.75rem;opacity:.8;margin-top:4px}
#prog-wrap{background:#b7e4c7;height:6px}
#prog-bar{height:6px;background:linear-gradient(90deg,#1b4332,#52b788);transition:width .4s ease;width:0%}
.container{max-width:600px;margin:0 auto;padding:24px 16px 60px;width:100%;flex:1}
#counter{text-align:center;font-size:.8rem;color:#555;margin-bottom:16px}

/* カード */
#q-card{background:#fff;border-radius:16px;padding:24px 20px;box-shadow:0 4px 16px rgba(0,0,0,.08);border-left:5px solid #52b788;display:flex;flex-direction:column;gap:14px;min-height:160px}
#sec-badge{display:inline-block;background:#d8f3dc;color:#1b4332;font-size:.72rem;font-weight:bold;padding:3px 10px;border-radius:100px;width:fit-content}
#q-text{font-size:1.05rem;line-height:1.9;font-weight:bold}
#q-hint{font-size:.85rem;color:#555;line-height:1.7}

/* テキスト入力 */
#input-row{display:flex;gap:8px;align-items:center}
#ans-input{flex:1;border:2px solid #ccc;border-radius:10px;padding:11px 13px;font-size:1.05rem;font-family:inherit;outline:none;transition:border-color .2s,background .2s;min-width:0}
#ans-input:focus{border-color:#52b788}
#ans-input.ok{border-color:#2d9e5b;background:#edfaf3}
#ans-input.ng{border-color:#e04040;background:#fff0f0;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
#show-btn{flex-shrink:0;background:none;border:1.5px solid #bbb;border-radius:8px;padding:9px 11px;font-size:.78rem;color:#666;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
#show-btn:hover{border-color:#52b788;color:#1b4332}

/* 選択肢 */
#choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{width:100%;background:#f8fdf9;border:2px solid #c8e6c9;border-radius:12px;padding:14px 16px;font-size:.95rem;font-family:inherit;text-align:left;cursor:pointer;transition:all .15s;line-height:1.6}
.choice-btn:hover{border-color:#52b788;background:#eaf5eb}
.choice-btn.selected-ok{border-color:#2d9e5b;background:#d4edda;color:#1b4332;font-weight:bold}
.choice-btn.selected-ng{border-color:#e04040;background:#fde8e8}
.choice-btn.reveal-ok{border-color:#2d9e5b;background:#d4edda}

/* フィードバック */
#feedback{text-align:center;font-size:1.1rem;font-weight:bold;min-height:28px}
#feedback.ok{color:#2d9e5b}
#feedback.ng{color:#e04040}

/* 次へ */
#next-btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#1b4332,#2d6a4f);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:bold;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(45,106,79,.3);transition:transform .1s,opacity .2s;margin-top:10px}
#next-btn:hover{transform:translateY(-1px)}
#next-btn:disabled{opacity:.35;cursor:default;transform:none}

/* 結果 */
#result{display:none;background:#fff;border-radius:16px;padding:36px 20px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.1)}
#result h2{font-size:1.4rem;color:#1b4332;margin-bottom:12px}
#r-score{font-size:3.6rem;font-weight:bold;color:#2d6a4f;line-height:1}
#r-sub{font-size:1rem;color:#777;margin:6px 0 18px}
#r-bar-w{background:#d8f3dc;border-radius:100px;height:12px;overflow:hidden;margin-bottom:18px}
#r-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,#1b4332,#52b788);width:0%;transition:width 1s ease}
#r-msg{font-size:1.05rem;margin-bottom:24px}
.retry-btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#1b4332,#2d6a4f);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:bold;cursor:pointer;font-family:inherit;margin-bottom:10px}
.section-btn{display:block;width:100%;padding:12px;background:#fff;color:#1b4332;border:2px solid #2d6a4f;border-radius:12px;font-size:.9rem;font-weight:bold;cursor:pointer;font-family:inherit;margin-bottom:8px}

/* セクション選択画面 */
#menu{background:#fff;border-radius:16px;padding:24px 20px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
#menu h2{font-size:1.1rem;font-weight:bold;color:#1b4332;margin-bottom:16px;text-align:center}
.menu-btn{display:block;width:100%;padding:14px 16px;background:#f8fdf9;border:2px solid #c8e6c9;border-radius:12px;font-size:.95rem;font-family:inherit;text-align:left;cursor:pointer;margin-bottom:10px;transition:all .15s;color:#222}
.menu-btn:hover{border-color:#52b788;background:#eaf5eb}
.menu-btn span{font-size:.75rem;color:#555;display:block;margin-top:3px}
</style>
</head>
<body>
<header>
  <h1>📗 アイオワの玉葱</h1>
  <p>長田 弘 ／ 第一章 確認テスト</p>
</header>
<div id="prog-wrap"><div id="prog-bar"></div></div>

<div class="container">
  <div id="counter"></div>

  <!-- セクション選択メニュー -->
  <div id="menu">
    <h2>問題を選んでください</h2>
    <button class="menu-btn" onclick="startSection(0)">
      【１】漢字と語句の確認 ① 読み
      <span>①〜⑮ の漢字の読みをひらがなで答える（15問）</span>
    </button>
    <button class="menu-btn" onclick="startSection(1)">
      【１】漢字と語句の確認 ② 書き
      <span>⑯〜㉚ カタカナを漢字に直す（15問）</span>
    </button>
    <button class="menu-btn" onclick="startSection(2)">
      【２】語句の意味
      <span>語句の意味を選択肢から選ぶ（3問）</span>
    </button>
    <button class="menu-btn" onclick="startSection(3)">
      【段落構成の整理】穴埋め
      <span>段落の空欄に入る語句を答える（10問）</span>
    </button>
    <button class="menu-btn" onclick="startSection(4)">
      【文脈と文意の整理】
      <span>読解・抜き出し・選択問題（6問）</span>
    </button>
    <button class="menu-btn" onclick="startSection(5)">
      【まとめ】総合問題
      <span>設問3〜7・まとめ（選択・記述）（7問）</span>
    </button>
    <button class="menu-btn" onclick="startAll()">
      🔀 全問シャッフル（56問）
      <span>全セクションをランダムに出題</span>
    </button>
  </div>

  <!-- 問題カード -->
  <div id="q-card" style="display:none">
    <div id="sec-badge"></div>
    <div id="q-text"></div>
    <div id="q-hint"></div>
    <div id="input-row" style="display:none">
      <input type="text" id="ans-input" placeholder="答えを入力" autocomplete="off"/>
      <button id="show-btn">答えを見る</button>
    </div>
    <div id="choices" style="display:none"></div>
    <div id="feedback"></div>
  </div>

  <button id="next-btn" style="display:none" disabled>次の問題 →</button>

  <!-- 結果画面 -->
  <div id="result">
    <h2>🎉 テスト終了！</h2>
    <div id="r-score"></div>
    <div id="r-sub"></div>
    <div id="r-bar-w"><div id="r-bar"></div></div>
    <div id="r-msg"></div>
    <button class="retry-btn" onclick="retrySection()">🔄 もう一度</button>
    <button class="section-btn" onclick="showMenu()">📋 問題選択に戻る</button>
  </div>
</div>

      choices: [
        'ア　自分が理解している玉葱の概念は、母語の違う他者が理解している玉葱の概念と同じなので、他者を理解することができるということ',
        'イ　日本の玉葱とアメリカの玉葱とアメリカの玉葱の概念は形や年類も同じなので、「Onion」と「玉葱」は同じである',
        'ウ　同じ玉葱であっても、自分と他者とでは玉葱の概念に違いがあるということ',
        'エ　同じ玉葱を見ていても、自分がそのままの玉葱の色や形を想像しているという',
      ],
      ans: 'ウ' },
  ]},
];

/* ============================================================
   クイズエンジン
============================================================ */
let currentSec = -1, order = [], idx = 0, correct = 0, answered = false, showing = false;

function normalize(s){
  return s.trim().replace(/\s+/g,'')
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
    .replace(/[ぁ-ん]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60));
}
function normAns(s){
  return s.trim().replace(/\s+/g,'')
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}
  return arr;
}

function showMenu(){
  document.getElementById('menu').style.display='block';
  document.getElementById('q-card').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('counter').textContent='';
  document.getElementById('prog-bar').style.width='0%';
}

// 全問まとめて
function startAll(){
  currentSec = -1;
  const all=[];
  SECTIONS.forEach((sec,si)=>{
    sec.qs.forEach((q,qi)=>all.push({si,qi}));
  });
  order = shuffle(all);
  idx=0; correct=0;
  document.getElementById('menu').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('q-card').style.display='flex';
  document.getElementById('next-btn').style.display='block';
  loadMixQuestion();
}

function startSection(si){
  currentSec=si;
  const sec=SECTIONS[si];
  order=shuffle([...Array(sec.qs.length).keys()]);
  idx=0; correct=0;
  document.getElementById('menu').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('q-card').style.display='flex';
  document.getElementById('next-btn').style.display='block';
  loadQuestion();
}

function retrySection(){
  document.getElementById('result').style.display='none';
  if(currentSec===-1) startAll();
  else startSection(currentSec);
}

/* 問題ロード (セクション別) */
function loadQuestion(){
  answered=false; showing=false;
  const sec=SECTIONS[currentSec];
  const q=sec.qs[order[idx]];
  const total=order.length;

  document.getElementById('counter').textContent=`${idx+1} / ${total}`;
  document.getElementById('prog-bar').style.width=(idx/total*100)+'%';
  document.getElementById('sec-badge').textContent=sec.badge;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-hint').textContent=q.h||'';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='';

  const nb=document.getElementById('next-btn');
  nb.disabled=true;
  nb.textContent=idx+1<total?'次の問題 →':'結果を見る';

  const qtype = q.type || sec.type;
  if(qtype==='choice'){
    renderChoices(q);
  } else {
    renderText(q);
  }
}

/* 全問シャッフル用 */
function loadMixQuestion(){
  answered=false; showing=false;
  const item=order[idx];
  const sec=SECTIONS[item.si];
  const q=sec.qs[item.qi];
  const total=order.length;

  document.getElementById('counter').textContent=`${idx+1} / ${total}`;
  document.getElementById('prog-bar').style.width=(idx/total*100)+'%';
  document.getElementById('sec-badge').textContent=sec.badge;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-hint').textContent=q.h||'';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='';

  const nb=document.getElementById('next-btn');
  nb.disabled=true;
  nb.textContent=idx+1<total?'次の問題 →':'結果を見る';

  const qtype = q.type || sec.type;
  if(qtype==='choice'){
    renderChoices(q);
  } else {
    renderText(q);
  }
}

function renderText(q){
  document.getElementById('input-row').style.display='flex';
  document.getElementById('choices').style.display='none';
  const inp=document.getElementById('ans-input');
  inp.value=''; inp.className=''; inp.placeholder='答えを入力'; inp.disabled=false;
  inp.focus();
  const sb=document.getElementById('show-btn');
  sb.textContent='答えを見る';
  sb.onclick=()=>{
    showing=!showing;
    inp.placeholder=showing?q.ans:'答えを入力';
    sb.textContent=showing?'隠す':'答えを見る';
  };
}

function renderChoices(q){
  document.getElementById('input-row').style.display='none';
  const box=document.getElementById('choices');
  box.style.display='flex';
  box.innerHTML='';
  q.choices.forEach(ch=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=ch;
    btn.onclick=()=>handleChoice(btn,ch,q);
    box.appendChild(btn);
  });
}

function handleChoice(btn,ch,q){
  if(answered) return;
  answered=true;
  const letter=ch.charAt(0); // 'ア','イ','ウ','エ'
  const ok=(letter===q.ans);
  if(ok) correct++;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    const bl=b.textContent.charAt(0);
    if(bl===q.ans) b.classList.add('reveal-ok');
  });
  if(ok) btn.classList.add('selected-ok');
  else   btn.classList.add('selected-ng');
  showFb(ok, ok?'':'正解：'+q.ans);
  document.getElementById('next-btn').disabled=false;
}

/* テキストリアルタイム */
document.getElementById('ans-input').addEventListener('input',()=>{
  if(answered) return;
  let q;
  if(currentSec===-1){
    const item=order[idx];
    q=SECTIONS[item.si].qs[item.qi];
  } else {
    q=SECTIONS[currentSec].qs[order[idx]];
  }
  const inp=document.getElementById('ans-input');
  const uv=normAns(inp.value);
  const av=normAns(q.ans);
  const ok=(uv===av || (av.includes(uv)&&uv.length>=2&&uv.length>=av.length-1));
  if(ok){
    answered=true; correct++;
    inp.classList.add('ok'); inp.disabled=true;
    showFb(true,'');
    document.getElementById('next-btn').disabled=false;
  }
});

document.getElementById('ans-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&answered) document.getElementById('next-btn').click();
});

function showFb(ok,hint){
  const fb=document.getElementById('feedback');
  if(ok){ fb.textContent='✅ 正解！'; fb.className='ok'; }
  else   { fb.textContent='❌ 不正解　'+hint; fb.className='ng';
    const inp=document.getElementById('ans-input');
    if(!inp.disabled){ inp.classList.add('ng'); setTimeout(()=>inp.classList.remove('ng'),400); }
  }
}

document.getElementById('next-btn').addEventListener('click',()=>{
  if(!answered) return;
  idx++;
  const total=order.length;
  if(idx>=total){ showResult(); return; }
  if(currentSec===-1) loadMixQuestion();
  else loadQuestion();
});

function showResult(){
  const total=order.length;
  const pct=Math.round(correct/total*100);
  document.getElementById('q-card').style.display='none';
  document.getElementById('counter').textContent='';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('prog-bar').style.width='100%';
  const rs=document.getElementById('result');
  rs.style.display='block';
  document.getElementById('r-score').textContent=pct+'%';
  document.getElementById('r-sub').textContent=`${correct} / ${total} 問正解`;
  let msg='';
  if(pct===100)      msg='🎉 満点！完璧です！';
  else if(pct>=80)   msg='👏 よくできました！';
  else if(pct>=60)   msg='📚 もう少し復習しましょう';
  else               msg='💪 教科書をもう一度確認してみよう';
  document.getElementById('r-msg').textContent=msg;
  setTimeout(()=>{ document.getElementById('r-bar').style.width=pct+'%'; },100);
}

showMenu();

// PWA Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js');
}
</script>
